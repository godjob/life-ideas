<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Life Ideas</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5; color: #333;
      display: flex; flex-direction: column; height: 100vh; overflow: hidden;
    }

    /* ヘッダー */
    header {
      background: #1a1a2e; color: #fff; padding: 12px 16px;
      display: flex; align-items: center; gap: 10px; flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 10px; flex: 1; }
    header h1 { font-size: 1.05rem; font-weight: 600; }
    .version { font-size: 0.72rem; color: #888; margin-left: 4px; }
    .header-right { display: flex; align-items: center; gap: 6px; }

    .icon-btn {
      background: none; border: none; color: #aaa; cursor: pointer;
      padding: 6px; border-radius: 4px; display: flex; align-items: center;
      transition: color 0.15s;
    }
    .icon-btn:hover { color: #fff; }

    /* タブ */
    .tabs { display: flex; background: #16213e; padding: 0 16px; flex-shrink: 0; overflow-x: auto; }
    .tab-btn {
      padding: 11px 18px; color: #aaa; background: none; border: none;
      cursor: pointer; font-size: 0.88rem; border-bottom: 3px solid transparent;
      transition: all 0.2s; white-space: nowrap;
    }
    .tab-btn.active { color: #fff; border-bottom-color: #e94560; }
    .tab-btn:hover { color: #fff; }

    /* 検索バー */
    .search-bar {
      background: #f0f2f5; border-bottom: 1px solid #e0e0e0;
      padding: 8px 16px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      flex-shrink: 0;
    }
    .search-bar.hidden { display: none; }
    mark.search-highlight { background: #f59e0b; color: #1a1a2e; border-radius: 2px; padding: 0 2px; }
    .search-date { display: flex; align-items: center; gap: 6px; }
    .search-date.hidden { display: none; }
    .search-date input[type="date"] {
      border: 1px solid #ccc; border-radius: 4px; padding: 4px 8px;
      font-size: 0.82rem; color: #333; background: #fff;
    }
    .search-date span { color: #888; font-size: 0.85rem; }
    .search-text-input {
      flex: 1; min-width: 120px; max-width: 280px;
      border: 1px solid #ccc; border-radius: 4px; padding: 4px 8px;
      font-size: 0.85rem; color: #333;
    }
    .search-text-input:focus { outline: none; border-color: #e94560; }
    .search-btn {
      background: #e94560; color: #fff; border: none; border-radius: 4px;
      padding: 5px 14px; font-size: 0.82rem; cursor: pointer;
    }
    .search-btn:hover { background: #c73652; }
    .search-reset-btn {
      background: none; color: #888; border: 1px solid #ccc; border-radius: 4px;
      padding: 5px 10px; font-size: 0.82rem; cursor: pointer;
    }
    .search-reset-btn:hover { border-color: #999; color: #555; }
    .search-count { font-size: 0.78rem; color: #888; white-space: nowrap; }

    /* モバイルナビバー（PC非表示） */
    .mobile-nav {
      display: none;
      background: #f0f2f5; border-bottom: 1px solid #ddd;
      padding: 6px 10px; align-items: center; gap: 8px; flex-shrink: 0;
    }
    .mobile-nav.visible { display: flex; }
    .nav-arrow {
      background: #fff; border: 1px solid #ccc; border-radius: 4px;
      padding: 5px 10px; font-size: 0.82rem; cursor: pointer; color: #555;
      flex-shrink: 1; white-space: nowrap; transition: all 0.15s;
      max-width: 35%; overflow: hidden; text-overflow: ellipsis;
    }
    .nav-arrow:disabled { opacity: 0.3; cursor: default; }
    .nav-arrow:not(:disabled):hover { border-color: #e94560; color: #e94560; }
    #mobile-select {
      flex: 1; border: 1px solid #ccc; border-radius: 4px;
      padding: 5px 6px; font-size: 0.85rem; color: #333; background: #fff;
      min-width: 0;
    }

    /* PC: 2カラムレイアウト */
    .layout { display: flex; flex: 1; min-height: 0; }

    .file-list {
      width: 240px; min-width: 240px; background: #fff;
      border-right: 1px solid #e0e0e0; overflow-y: auto;
      padding: 8px 0; flex-shrink: 0;
    }
    .file-item {
      padding: 10px 16px; cursor: pointer; font-size: 0.85rem;
      color: #555; border-left: 3px solid transparent;
      transition: all 0.15s; line-height: 1.4; white-space: nowrap;
    }
    .file-item:hover { background: #f0f4ff; color: #333; }
    .file-item.active { background: #f0f4ff; border-left-color: #e94560; color: #1a1a2e; font-weight: 600; }
    .file-item.empty { color: #aaa; cursor: default; font-style: italic; padding: 16px; white-space: normal; }

    .content-area {
      flex: 1; overflow-y: auto; padding: 32px;
      background: #fff; position: relative;
    }

    /* Markdown 本文スタイル */
    .markdown-body { max-width: 800px; margin: 0 auto; line-height: 1.7; }
    .markdown-body h1 { font-size: 1.6rem; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid #e94560; }
    .markdown-body h2 { font-size: 1.2rem; margin: 24px 0 8px; color: #1a1a2e; }
    .markdown-body h3 { font-size: 1rem; margin: 16px 0 6px; color: #444; }
    .markdown-body p { margin-bottom: 12px; }
    .markdown-body ul, .markdown-body ol { margin: 8px 0 12px 20px; }
    .markdown-body li { margin-bottom: 4px; }
    .markdown-body a { color: #e94560; text-decoration: none; }
    .markdown-body a:hover { text-decoration: underline; }
    .markdown-body table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 0.85rem; }
    .markdown-body th { background: #1a1a2e; color: #fff; padding: 8px 12px; text-align: left; }
    .markdown-body td { padding: 8px 12px; border-bottom: 1px solid #eee; }
    .markdown-body tr:hover td { background: #f9f9f9; }
    .markdown-body code { background: #f4f4f4; padding: 2px 6px; border-radius: 3px; font-size: 0.85em; }
    .markdown-body pre { background: #1a1a2e; color: #e0e0e0; padding: 16px; border-radius: 6px; overflow-x: auto; margin: 12px 0; }
    .markdown-body pre code { background: none; padding: 0; color: inherit; }
    .markdown-body blockquote { border-left: 4px solid #e94560; padding-left: 16px; color: #666; margin: 12px 0; }
    .markdown-body input[type="checkbox"] { margin-right: 6px; }

    .placeholder { text-align: center; color: #aaa; margin-top: 80px; }
    .placeholder p { font-size: 1rem; margin-top: 8px; }

    /* ===== URLsタブ専用スタイル ===== */
    .urls-container { width: 100%; }

    /* タグフィルタチップ */
    .tag-filter {
      display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px;
    }
    .tag-chip {
      background: #f0f0f0; border: 1px solid #ddd; border-radius: 14px;
      padding: 4px 12px; font-size: 0.78rem; cursor: pointer; color: #555;
      transition: all 0.15s; white-space: nowrap;
    }
    .tag-chip.active { background: #e94560; color: #fff; border-color: #e94560; }
    .tag-chip:hover:not(.active) { border-color: #e94560; color: #e94560; }

    /* URLテーブル */
    .table-wrap { overflow-x: auto; }
    .urls-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .urls-table th {
      background: #1a1a2e; color: #fff; padding: 10px 12px;
      text-align: left; white-space: nowrap;
    }
    .urls-table th.sortable { cursor: pointer; user-select: none; }
    .urls-table th.sortable:hover { background: #2a2a4e; }
    .urls-table td { padding: 10px 12px; border-bottom: 1px solid #eee; vertical-align: top; }
    .urls-table tr:hover td { background: #f9f9f9; }
    .urls-table a { color: #e94560; text-decoration: none; }
    .urls-table a:hover { text-decoration: underline; }
    .date-cell { white-space: nowrap; color: #888; font-size: 0.8rem; width: 72px; }
    .tags-cell { width: 160px; }
    .tag-chip-sm {
      display: inline-block; background: #eef2ff; color: #4a6cf7;
      border-radius: 10px; padding: 1px 7px; font-size: 0.72rem;
      white-space: nowrap; margin: 1px 2px 1px 0;
    }
    .title-cell { width: 200px; }
    .urls-count {
      margin-top: 10px; font-size: 0.8rem; color: #aaa; text-align: right;
    }
    /* ============================= */

    /* ===== 記事タブ専用スタイル ===== */
    .news-header {
      display: flex; align-items: baseline;
      justify-content: space-between; flex-wrap: wrap; gap: 8px;
      border-bottom: 2px solid #e94560; margin-bottom: 16px; padding-bottom: 8px;
    }
    .news-header h1 { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .news-meta { display: flex; gap: 10px; font-size: 0.82rem; color: #888; white-space: nowrap; }
    .news-toc { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
    .news-toc a {
      background: #f0f4ff; color: #4a6cf7; border: 1px solid #c8d6ff;
      border-radius: 14px; padding: 4px 12px; font-size: 0.82rem;
      text-decoration: none; white-space: nowrap;
    }
    .news-toc a:hover { background: #e94560; color: #fff; border-color: #e94560; }
    .news-table { width: 100%; border-collapse: collapse; }
    .news-table td { padding: 8px 10px; border-bottom: 1px solid #eee; vertical-align: top; }
    .news-date  { width: 15%; font-size: 0.8rem; color: #888; }
    .news-title { width: 60%; }
    .news-title a { color: #e94560; text-decoration: none; }
    .news-title a:hover { text-decoration: underline; }
    .news-media { width: 25%; font-size: 0.8rem; color: #666; }
    /* ================================ */

    /* スクロールトップボタン */
    .scroll-top {
      position: fixed; bottom: 24px; right: 24px;
      width: 44px; height: 44px; border-radius: 50%;
      background: #e94560; color: #fff; border: none;
      font-size: 1.2rem; cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      display: none; align-items: center; justify-content: center;
      z-index: 100;
    }
    .scroll-top.visible { display: flex; }
    .scroll-top:hover { background: #c73652; }

    /* スマホ */
    @media (max-width: 768px) {
      .file-list { display: none; }
      .content-area {
        padding: 16px;
        overflow-x: hidden;
        overscroll-behavior: contain;
      }
      .tab-btn { padding: 10px 12px; font-size: 0.82rem; }
      .scroll-top { bottom: 16px; right: 16px; width: 40px; height: 40px; font-size: 1rem; }
      .urls-table { font-size: 0.78rem; table-layout: auto; }
      .urls-table td, .urls-table th { padding: 8px; }
      .title-cell { min-width: 140px; width: auto; }
      .date-cell { width: 56px; }
      .tags-cell { width: auto; white-space: nowrap; }
      /* 記事テーブルがビューポート幅を超えないよう制御 */
      .markdown-body table {
        display: block; overflow-x: auto;
        max-width: 100%; min-width: 100%; width: max-content;
      }
      /* news-table はビューポート内に収めてタイトル列を優先 */
      .news-table {
        display: table; table-layout: fixed;
        overflow-x: visible; width: 100%;
      }

      /* スクロール非表示アニメーション（滑らか化） */
      .search-bar:not(.hidden) {
        max-height: 80px;
        transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                    opacity 0.2s ease,
                    padding 0.25s ease,
                    border-width 0.25s ease;
      }
      .mobile-nav.visible {
        max-height: 60px;
        transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                    opacity 0.2s ease,
                    padding 0.25s ease,
                    border-width 0.25s ease;
      }
      .search-bar.scroll-hidden {
        max-height: 0 !important; overflow: hidden !important;
        opacity: 0 !important;
        padding-top: 0 !important; padding-bottom: 0 !important;
        border-bottom-width: 0 !important;
      }
      .mobile-nav.scroll-hidden {
        max-height: 0 !important; overflow: hidden !important;
        opacity: 0 !important;
        padding-top: 0 !important; padding-bottom: 0 !important;
        border-bottom-width: 0 !important;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#e94560" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
    <h1>Life Ideas <span class="version" id="version-label"></span></h1>
  </div>
  <div class="header-right">
    <a href="shared.html" target="_blank" class="icon-btn" title="共有ページを開く" aria-label="共有ページを開く" style="text-decoration:none;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
      </svg>
    </a>
    <button class="icon-btn" onclick="location.reload()" title="再読み込み" aria-label="再読み込み">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
    </button>
  </div>
</header>

<div class="tabs">
  <button class="tab-btn" onclick="switchTab('daily', this)">Daily</button>
  <button class="tab-btn" onclick="switchTab('weekly', this)">Weekly</button>
  <button class="tab-btn" onclick="switchTab('urls', this)">URLs</button>
  <button class="tab-btn" onclick="switchTab('news', this)">記事</button>
  <button class="tab-btn" onclick="switchTab('health', this)">Health</button>
  <button class="tab-btn" onclick="switchTab('books', this)">Books</button>
  <button class="tab-btn" onclick="switchTab('action', this)">Action</button>
</div>

<!-- 検索バー -->
<div class="search-bar hidden" id="search-bar">
  <div class="search-date hidden" id="search-date">
    <input type="date" id="date-from" title="開始日">
    <span>〜</span>
    <input type="date" id="date-to" title="終了日">
  </div>
  <input type="text" id="search-text" class="search-text-input" placeholder="キーワード検索..." onkeydown="if(event.key==='Enter')doSearch()">
  <button class="search-btn" onclick="doSearch()">検索</button>
  <button class="search-reset-btn" onclick="resetSearch()">リセット</button>
  <span id="search-count" class="search-count"></span>
</div>

<!-- モバイルナビバー -->
<div class="mobile-nav" id="mobile-nav">
  <button class="nav-arrow" id="nav-prev" onclick="navigateFile(1)">←</button>
  <select id="mobile-select" onchange="navigateBySelect(this.value)"></select>
  <button class="nav-arrow" id="nav-next" onclick="navigateFile(-1)">→</button>
</div>

<div class="layout">
  <div class="file-list" id="file-list">
    <div class="file-item empty">読み込み中...</div>
  </div>
  <div class="content-area" id="content-area">
    <div class="placeholder">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ddd" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <p>ファイルを選択してください</p>
    </div>
  </div>
</div>

<button class="scroll-top" id="scroll-top" onclick="scrollToTop()" title="上に戻る">↑</button>

<script>
  const REPO = 'godjob/life-ideas';
  const BRANCH = 'main';
  const VERSION = 'v1.23';
  let currentTab = 'daily';
  let allFiles = [];
  let currentFileIndex = -1;
  let lastScrollY = 0;
  let scrollAccumulator = 0;
  const HIDE_THRESHOLD = 40;
  const SHOW_THRESHOLD = 30;
  let currentSearchQuery = '';
  const isMobile = () => window.innerWidth <= 768;
  const SINGLE_FILE_TABS = ['urls', 'health'];
  const SEARCH_TABS = ['daily', 'weekly', 'news', 'books', 'action'];
  const DATE_FILTER_TABS = ['daily', 'news'];

  // URLsタブ専用ステート
  let urlsData = [];
  let urlsSortCol = 'regDate';
  let urlsSortDir = 'desc';
  let urlsActiveTag = null;

  document.getElementById('version-label').textContent = VERSION;

  function highlightText(container, query) {
    const terms = query.split(/\s+/).filter(Boolean);
    if (!terms.length) return;
    const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, {
      acceptNode(node) {
        const tag = node.parentElement && node.parentElement.tagName;
        if (['SCRIPT', 'STYLE', 'MARK'].includes(tag)) return NodeFilter.FILTER_REJECT;
        return NodeFilter.FILTER_ACCEPT;
      }
    });
    const nodes = [];
    while (walker.nextNode()) nodes.push(walker.currentNode);
    for (const node of nodes) {
      const text = node.textContent;
      const lower = text.toLowerCase();
      let result = ''; let pos = 0; let found = false;
      const positions = [];
      for (const term of terms) {
        let i = 0;
        while ((i = lower.indexOf(term, i)) !== -1) { positions.push([i, i + term.length]); i++; }
      }
      if (!positions.length) continue;
      positions.sort((a, b) => a[0] - b[0]);
      // merge overlapping
      const merged = [positions[0]];
      for (let k = 1; k < positions.length; k++) {
        const last = merged[merged.length - 1];
        if (positions[k][0] <= last[1]) { last[1] = Math.max(last[1], positions[k][1]); }
        else { merged.push(positions[k]); }
      }
      for (const [start, end] of merged) {
        result += text.slice(pos, start).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        result += `<mark class="search-highlight">${text.slice(start, end).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</mark>`;
        pos = end; found = true;
      }
      if (found) {
        result += text.slice(pos).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        const span = document.createElement('span');
        span.innerHTML = result;
        node.parentNode.replaceChild(span, node);
      }
    }
  }

  function makeExternalLinksNewTab(container) {
    container.querySelectorAll('a[href]').forEach(a => {
      if (a.href.startsWith('http') && !a.href.includes(location.hostname)) {
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
      }
    });
  }

  async function listFiles(dir) {
    const url = `https://api.github.com/repos/${REPO}/contents/ideas/${dir}?ref=${BRANCH}`;
    const res = await fetch(url);
    if (!res.ok) return [];
    const data = await res.json();
    return data.filter(f => f.name.endsWith('.md') && f.name !== '.gitkeep');
  }

  async function fetchContent(path) {
    const url = `https://raw.githubusercontent.com/${REPO}/${BRANCH}/${path}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`${res.status} ${res.statusText}: ${path}`);
    return await res.text();
  }

  function formatLabel(dir, name) {
    const base = name.replace('.md', '');
    if (dir === 'daily') {
      const parts = base.split('-');
      return `'${parts[0].slice(2)}/${parts[1]}-${parts[2]}`;
    }
    if (dir === 'news') {
      const parts = base.split('-');
      return `${parts[1]}/${parts[2]}`;
    }
    if (dir === 'books') {
      // YYYY-MM-DD_slug → '26/02/04 タイトル
      const m = base.match(/^(\d{4})-(\d{2})-(\d{2})_(.+)$/);
      if (m) return `'${m[1].slice(2)}/${m[2]}/${m[3]} ${m[4].replace(/-/g, ' ')}`;
      // YYYY-MM_slug (旧形式) → '26/03 タイトル
      const m2 = base.match(/^(\d{4})-(\d{2})_(.+)$/);
      if (m2) return `'${m2[1].slice(2)}/${m2[2]} ${m2[3].replace(/-/g, ' ')}`;
      return base;
    }
    if (dir === 'action') {
      // 2026-03-12_slug → '26/03/12 slug
      const m = base.match(/^(\d{4})-(\d{2})-(\d{2})_(.+)$/);
      if (m) return `'${m[1].slice(2)}/${m[2]}/${m[3]} ${m[4].replace(/-/g, ' ')}`;
      return base;
    }
    return base;
  }

  function buildItems(files, dir, container, onSelect) {
    container.innerHTML = '';
    files.forEach((file, i) => {
      const item = document.createElement('div');
      item.className = 'file-item';
      const label = formatLabel(dir, file.name);
      if (file.matchCount != null) {
        item.innerHTML = `<span>${label}</span><span style="font-size:0.75rem;background:#f59e0b;color:#1a1a2e;border-radius:10px;padding:1px 7px;margin-left:auto;flex-shrink:0;">${file.matchCount}</span>`;
        item.style.display = 'flex';
        item.style.alignItems = 'center';
        item.style.gap = '6px';
      } else {
        item.textContent = label;
      }
      item.title = file.name.replace('.md', '');
      item.dataset.path = file.path;
      item.onclick = () => onSelect(file.path, item, i);
      container.appendChild(item);
    });
  }

  function updateMobileNav(files, idx) {
    const nav = document.getElementById('mobile-nav');
    if (!isMobile() || SINGLE_FILE_TABS.includes(currentTab) || files.length === 0) {
      nav.classList.remove('visible');
      return;
    }
    nav.classList.add('visible');

    const select = document.getElementById('mobile-select');
    select.innerHTML = files.map((f, i) =>
      `<option value="${i}"${i === idx ? ' selected' : ''}>${formatLabel(currentTab, f.name)}</option>`
    ).join('');

    const prevBtn = document.getElementById('nav-prev');
    const nextBtn = document.getElementById('nav-next');
    const prevFile = files[idx + 1];
    const nextFile = files[idx - 1];
    prevBtn.disabled = idx >= files.length - 1;
    prevBtn.textContent = prevFile ? `← ${formatLabel(currentTab, prevFile.name)}` : '←';
    nextBtn.disabled = idx <= 0;
    nextBtn.textContent = nextFile ? `${formatLabel(currentTab, nextFile.name)} →` : '→';
  }

  function navigateFile(offset) {
    const newIdx = currentFileIndex + offset;
    if (newIdx < 0 || newIdx >= allFiles.length) return;
    currentFileIndex = newIdx;
    const file = allFiles[newIdx];
    updateMobileNav(allFiles, currentFileIndex);
    document.querySelectorAll('#file-list .file-item').forEach((item, i) => {
      item.classList.toggle('active', i === newIdx);
    });
    openFile(file.path, null);
  }

  function navigateBySelect(val) {
    const idx = parseInt(val);
    if (isNaN(idx)) return;
    navigateFile(idx - currentFileIndex);
  }

  async function switchTab(dir, btn) {
    currentTab = dir;
    allFiles = [];
    currentFileIndex = -1;
    lastScrollY = 0;
    currentSearchQuery = '';
    localStorage.setItem('lastTab', dir);

    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
    document.getElementById('search-bar').classList.remove('scroll-hidden');
    document.getElementById('mobile-nav').classList.remove('scroll-hidden');

    const searchBar = document.getElementById('search-bar');
    const searchDate = document.getElementById('search-date');
    if (SEARCH_TABS.includes(dir)) {
      searchBar.classList.remove('hidden');
      searchDate.classList.toggle('hidden', !DATE_FILTER_TABS.includes(dir));
    } else {
      searchBar.classList.add('hidden');
    }
    document.getElementById('search-count').textContent = '';
    document.getElementById('mobile-nav').classList.remove('visible');

    const listEl = document.getElementById('file-list');
    const contentEl = document.getElementById('content-area');
    listEl.innerHTML = '<div class="file-item empty">読み込み中...</div>';
    contentEl.innerHTML = '<div style="padding:32px;color:#aaa;text-align:center;">読み込み中...</div>';

    // URLsタブ: 専用レンダラー
    if (dir === 'urls') {
      listEl.innerHTML = '<div class="file-item active">URLリスト</div>';
      await renderUrlsTab();
      return;
    }

    // Healthタブ: 単一ファイル表示
    if (dir === 'health') {
      listEl.innerHTML = '<div class="file-item active">健康管理プラン</div>';
      openFile('health/supplement-health-plan.md', listEl.firstChild);
      return;
    }

    const files = await listFiles(dir);
    if (files.length === 0) {
      listEl.innerHTML = '<div class="file-item empty">ファイルなし</div>';
      contentEl.innerHTML = '<div class="placeholder"><p>ファイルを選択してください</p></div>';
      return;
    }

    files.sort((a, b) => b.name > a.name ? 1 : -1);
    allFiles = files;

    buildItems(files, dir, listEl, (path, item, idx) => {
      currentFileIndex = idx;
      updateMobileNav(allFiles, currentFileIndex);
      document.querySelectorAll('.file-item').forEach(i => i.classList.remove('active'));
      item.classList.add('active');
      openFile(path, item);
    });

    currentFileIndex = 0;
    updateMobileNav(files, 0);
    listEl.firstChild.click();
  }

  function renderFileList(files) {
    const listEl = document.getElementById('file-list');
    if (files.length === 0) {
      listEl.innerHTML = '<div class="file-item empty">該当なし</div>';
      document.getElementById('mobile-nav').classList.remove('visible');
      document.getElementById('content-area').innerHTML = '<div class="placeholder"><p>検索結果がありません</p></div>';
      return;
    }
    buildItems(files, currentTab, listEl, (path, item, idx) => {
      currentFileIndex = idx;
      updateMobileNav(files, currentFileIndex);
      document.querySelectorAll('.file-item').forEach(i => i.classList.remove('active'));
      item.classList.add('active');
      openFile(path, item);
    });
    currentFileIndex = 0;
    updateMobileNav(files, 0);
    listEl.firstChild.click();
  }

  async function doSearch() {
    const dir = currentTab;
    const dateFrom = document.getElementById('date-from').value;
    const dateTo = document.getElementById('date-to').value;
    const textQuery = document.getElementById('search-text').value.trim().toLowerCase();

    let filtered = [...allFiles];

    if (DATE_FILTER_TABS.includes(dir) && (dateFrom || dateTo)) {
      filtered = filtered.filter(f => {
        const m = f.name.match(/^(\d{4}-\d{2}-\d{2})/);
        if (!m) return true;
        const d = m[1];
        if (dateFrom && d < dateFrom) return false;
        if (dateTo && d > dateTo) return false;
        return true;
      });
    }

    if (textQuery) {
      const terms = textQuery.split(/\s+/).filter(Boolean);
      currentSearchQuery = textQuery;
      document.getElementById('file-list').innerHTML = '<div class="file-item empty">検索中...</div>';
      document.getElementById('search-count').textContent = '';
      const results = [];
      for (const file of filtered) {
        try {
          const text = await fetchContent(file.path);
          const lower = text.toLowerCase();
          if (terms.every(t => lower.includes(t))) {
            const count = terms.reduce((sum, t) => {
              let n = 0, i = 0;
              while ((i = lower.indexOf(t, i)) !== -1) { n++; i++; }
              return sum + n;
            }, 0);
            results.push({ ...file, matchCount: count });
          }
        } catch {}
      }
      filtered = results;
    } else {
      currentSearchQuery = '';
    }

    document.getElementById('search-count').textContent = `${filtered.length}件`;
    renderFileList(filtered);
  }

  function resetSearch() {
    currentSearchQuery = '';
    document.getElementById('date-from').value = '';
    document.getElementById('date-to').value = '';
    document.getElementById('search-text').value = '';
    document.getElementById('search-count').textContent = '';
    renderFileList(allFiles);
  }

  // ===== URLsタブ専用処理 =====

  // Markdownテーブルをパース
  // 期待フォーマット: | 登録日 | 投稿日 | タグ | タイトル | 要約 |
  function parseUrlsMarkdown(md) {
    const lines = md.split('\n').filter(l => l.trim().startsWith('|'));
    // lines[0] = ヘッダー行, lines[1] = セパレータ行, lines[2+] = データ行
    if (lines.length < 3) return [];

    return lines.slice(2).map(line => {
      const cells = line.split('|').slice(1, -1).map(c => c.trim());
      if (cells.length < 5) return null;
      const [regDate, pubDate, tagsRaw, titleRaw, summary] = cells;

      // セパレータ行（---）が混入していたらスキップ
      if (regDate.includes('---')) return null;

      // タグをカンマ分割
      const tags = tagsRaw
        ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean)
        : [];

      // タイトルからリンクを抽出: [text](url)
      const linkMatch = titleRaw.match(/^\[(.+?)\]\((.+?)\)$/);
      const title = linkMatch ? linkMatch[1] : titleRaw;
      const url = linkMatch ? linkMatch[2] : '';

      return { regDate, pubDate: pubDate || '-', tags, title, url, summary };
    }).filter(Boolean);
  }

  async function renderUrlsTab() {
    const contentEl = document.getElementById('content-area');
    urlsActiveTag = null;
    urlsSortCol = 'regDate';
    urlsSortDir = 'desc';

    let md;
    try {
      md = await fetchContent('ideas/urls/index.md');
    } catch (e) {
      contentEl.innerHTML = `<div class="placeholder"><p style="color:#e94560;">読み込みエラー<br><small>${e.message}</small></p></div>`;
      return;
    }

    urlsData = parseUrlsMarkdown(md);
    if (urlsData.length === 0) {
      contentEl.innerHTML = '<div class="placeholder"><p>データがありません</p></div>';
      return;
    }

    renderUrlsTable(contentEl);
  }

  function renderUrlsTable(contentEl) {
    // 全タグを収集（アルファベット順）
    const allTags = [...new Set(urlsData.flatMap(r => r.tags))].sort();

    // タグフィルタ適用
    const filtered = urlsActiveTag
      ? urlsData.filter(r => r.tags.includes(urlsActiveTag))
      : urlsData;

    // ソート（'-' は最後に来るよう処理）
    const sorted = [...filtered].sort((a, b) => {
      const av = a[urlsSortCol] === '-' ? '' : (a[urlsSortCol] || '');
      const bv = b[urlsSortCol] === '-' ? '' : (b[urlsSortCol] || '');
      if (!av && !bv) return 0;
      if (!av) return 1;   // '-' は末尾
      if (!bv) return -1;
      const cmp = av.localeCompare(bv);
      return urlsSortDir === 'desc' ? -cmp : cmp;
    });

    // ソートヘッダーの矢印
    const arrow = col => {
      if (urlsSortCol !== col) return ' <span style="color:#888;font-size:0.8em">⇅</span>';
      return urlsSortDir === 'desc'
        ? ' <span style="color:#e94560">↓</span>'
        : ' <span style="color:#e94560">↑</span>';
    };

    // タグフィルタチップ HTML
    const tagFilterHtml = allTags.map(t =>
      `<button class="tag-chip${t === urlsActiveTag ? ' active' : ''}" onclick="urlsFilterTag('${t}')">${t}</button>`
    ).join('');

    // テーブル行 HTML
    const rowsHtml = sorted.map(r => {
      const tagChips = r.tags.map(t =>
        `<span class="tag-chip-sm">${t}</span>`
      ).join('');
      const titleHtml = r.url
        ? `<a href="${r.url}" target="_blank" rel="noopener noreferrer">${r.title}</a>`
        : r.title;
      return `<tr>
        <td class="date-cell">${r.regDate}</td>
        <td class="date-cell">${r.pubDate}</td>
        <td class="title-cell">${titleHtml}</td>
        <td>${r.summary}</td>
        <td class="tags-cell">${tagChips}</td>
      </tr>`;
    }).join('');

    contentEl.innerHTML = `
      <div class="urls-container">
        <div class="tag-filter">${tagFilterHtml}</div>
        <div class="table-wrap">
          <table class="urls-table">
            <thead>
              <tr>
                <th class="sortable" onclick="urlsSort('regDate')">登録日${arrow('regDate')}</th>
                <th class="sortable" onclick="urlsSort('pubDate')">投稿日${arrow('pubDate')}</th>
                <th>タイトル</th>
                <th>要約</th>
                <th>タグ</th>
              </tr>
            </thead>
            <tbody>${rowsHtml}</tbody>
          </table>
        </div>
        <p class="urls-count">${sorted.length} 件${urlsActiveTag ? ` — タグ: ${urlsActiveTag}` : ''}</p>
      </div>`;
  }

  function urlsSort(col) {
    if (urlsSortCol === col) {
      urlsSortDir = urlsSortDir === 'desc' ? 'asc' : 'desc';
    } else {
      urlsSortCol = col;
      urlsSortDir = 'desc';
    }
    renderUrlsTable(document.getElementById('content-area'));
  }

  function urlsFilterTag(tag) {
    urlsActiveTag = urlsActiveTag === tag ? null : tag;
    renderUrlsTable(document.getElementById('content-area'));
  }

  // ===========================

  // ===== 記事タブ専用レンダラー =====
  function renderNewsContent(html) {
    const div = document.createElement('div');
    div.innerHTML = html;

    // blockquote からメタ情報を抽出して削除
    const blockquote = div.querySelector('blockquote');
    let timeStr = '';
    let countStr = '';
    if (blockquote) {
      const text = blockquote.textContent || '';
      // 収集時刻: "収集: 2026-03-10 13:45 JST" → "13:45"
      const timeMatch = text.match(/収集[：:]\s*[\d-]+\s+(\d{2}:\d{2})/);
      if (timeMatch) timeStr = timeMatch[1];
      // 記事数: "記事数: 58件（直近7日以内）"
      const countMatch = text.match(/記事数[：:]\s*([^\n※]+)/);
      if (countMatch) countStr = countMatch[1].trim();
      blockquote.remove();
    }

    // h1 をラッパーで包んでメタ情報を右側に追加
    const h1 = div.querySelector('h1');
    if (h1) {
      const wrapper = document.createElement('div');
      wrapper.className = 'news-header';
      h1.parentNode.insertBefore(wrapper, h1);
      wrapper.appendChild(h1);
      if (timeStr || countStr) {
        const meta = document.createElement('div');
        meta.className = 'news-meta';
        if (timeStr) meta.innerHTML += `<span>🕐 ${timeStr}</span>`;
        if (countStr) meta.innerHTML += `<span>${countStr}</span>`;
        wrapper.appendChild(meta);
      }
    }

    // h2 にアンカーID付与 + TOC生成
    const h2s = div.querySelectorAll('h2');
    if (h2s.length > 0) {
      const toc = document.createElement('nav');
      toc.className = 'news-toc';
      h2s.forEach((h2, i) => {
        const id = `section-${i}`;
        h2.id = id;
        const a = document.createElement('a');
        a.href = `#${id}`;
        a.textContent = h2.textContent;
        a.addEventListener('click', (e) => {
          e.preventDefault();
          h2.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
        toc.appendChild(a);
      });
      const header = div.querySelector('.news-header');
      if (header) header.after(toc);
      else div.prepend(toc);
    }

    // テーブル変換: 掲載日 | タイトル（リンク付き）| 媒体名
    div.querySelectorAll('table').forEach(table => {
      const rows = table.querySelectorAll('tbody tr');
      if (!rows.length) return;
      const thead = table.querySelector('thead tr');
      table.classList.add('news-table');
      if (thead) thead.innerHTML = '<th>掲載日</th><th>タイトル</th><th>媒体名</th>';
      rows.forEach(tr => {
        const tds = tr.querySelectorAll('td');
        if (tds.length < 4) return;
        const titleText = tds[0].textContent.trim();
        const mediaText = tds[1].textContent.trim();
        const dateText  = tds[2].textContent.trim();
        const linkEl    = tds[3].querySelector('a');
        const url       = linkEl ? linkEl.href : '';
        // タイトル末尾の " - 媒体名" を除去（※を除いた媒体名で照合）
        const mediaClean  = mediaText.replace(/※$/, '').trim();
        const escapedMedia = mediaClean.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const cleanTitle  = titleText.replace(new RegExp(` - ${escapedMedia}$`), '').trim();
        const titleCell   = url
          ? `<td class="news-title"><a href="${url}" target="_blank" rel="noopener noreferrer">${cleanTitle}</a></td>`
          : `<td class="news-title">${cleanTitle}</td>`;
        tr.innerHTML = `<td class="news-date">${dateText}</td>${titleCell}<td class="news-media">${mediaText}</td>`;
      });
    });

    return div.innerHTML;
  }
  // ==================================

  async function openFile(path, itemEl) {
    const contentEl = document.getElementById('content-area');

    if (itemEl) {
      document.querySelectorAll('.file-item').forEach(i => i.classList.remove('active'));
      itemEl.classList.add('active');
    }

    contentEl.innerHTML = '<div style="padding:32px;color:#aaa;text-align:center;">読み込み中...</div>';

    let text;
    try {
      text = await fetchContent(path);
    } catch (e) {
      contentEl.innerHTML = `<div class="placeholder"><p style="color:#e94560;">読み込みエラー<br><small>${e.message}</small></p></div>`;
      return;
    }

    let rendered = marked.parse(text);
    if (currentTab === 'news') rendered = renderNewsContent(rendered);
    contentEl.innerHTML = `<div class="markdown-body">${rendered}</div>`;
    makeExternalLinksNewTab(contentEl);
    if (currentSearchQuery) highlightText(contentEl, currentSearchQuery);

    contentEl.querySelectorAll('li').forEach(li => {
      if (li.textContent.startsWith('[ ]')) {
        li.innerHTML = '<input type="checkbox" disabled> ' + li.innerHTML.replace('[ ]', '').trim();
      } else if (li.textContent.startsWith('[x]') || li.textContent.startsWith('[X]')) {
        li.innerHTML = '<input type="checkbox" checked disabled> ' + li.innerHTML.replace(/\[[xX]\]/, '').trim();
      }
    });

    contentEl.scrollTop = 0;
  }

  document.getElementById('content-area').addEventListener('scroll', () => {
    const el = document.getElementById('content-area');
    const scrollTop = el.scrollTop;
    document.getElementById('scroll-top').classList.toggle('visible', scrollTop > 300);

    if (isMobile()) {
      const maxScroll = el.scrollHeight - el.clientHeight;
      const nearBottom = scrollTop >= maxScroll - 50;
      const delta = scrollTop - lastScrollY;

      if (scrollTop <= 10) {
        scrollAccumulator = 0;
        document.getElementById('search-bar').classList.remove('scroll-hidden');
        document.getElementById('mobile-nav').classList.remove('scroll-hidden');
      } else if (nearBottom && delta < 0) {
        scrollAccumulator = 0;
      } else {
        scrollAccumulator += delta;
        if (scrollAccumulator > HIDE_THRESHOLD) {
          scrollAccumulator = 0;
          document.getElementById('search-bar').classList.add('scroll-hidden');
          document.getElementById('mobile-nav').classList.add('scroll-hidden');
        } else if (scrollAccumulator < -SHOW_THRESHOLD) {
          scrollAccumulator = 0;
          document.getElementById('search-bar').classList.remove('scroll-hidden');
          document.getElementById('mobile-nav').classList.remove('scroll-hidden');
        }
      }
    }
    lastScrollY = scrollTop;
  });
  window.addEventListener('scroll', () => {
    document.getElementById('scroll-top').classList.toggle('visible', window.scrollY > 300);
  });

  function scrollToTop() {
    document.getElementById('content-area').scrollTo({ top: 0, behavior: 'smooth' });
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // 初期表示（最後のタブを復元）
  const savedTab = localStorage.getItem('lastTab') || 'daily';
  const tabBtn = document.querySelector(`.tab-btn[onclick*="'${savedTab}'"]`);
  switchTab(savedTab, tabBtn);
</script>
