<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Life Ideas</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; }

    header { background: #1a1a2e; color: #fff; padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 1.1rem; font-weight: 600; }

    .tabs { display: flex; background: #16213e; padding: 0 16px; }
    .tab-btn {
      padding: 12px 20px; color: #aaa; background: none; border: none;
      cursor: pointer; font-size: 0.9rem; border-bottom: 3px solid transparent;
      transition: all 0.2s;
    }
    .tab-btn.active { color: #fff; border-bottom-color: #e94560; }
    .tab-btn:hover { color: #fff; }

    /* PC: 2カラムレイアウト */
    .layout { display: flex; height: calc(100vh - 96px); }

    .file-list {
      width: 240px; min-width: 240px; background: #fff;
      border-right: 1px solid #e0e0e0; overflow-y: auto;
      padding: 8px 0;
    }
    .file-item {
      padding: 10px 16px; cursor: pointer; font-size: 0.85rem;
      color: #555; border-left: 3px solid transparent;
      transition: all 0.15s; line-height: 1.4;
      word-break: break-all;
    }
    .file-item:hover { background: #f0f4ff; color: #333; }
    .file-item.active { background: #f0f4ff; border-left-color: #e94560; color: #1a1a2e; font-weight: 600; }
    .file-item.empty { color: #aaa; cursor: default; font-style: italic; padding: 16px; }

    .content-area {
      flex: 1; overflow-y: auto; padding: 32px;
      background: #fff; position: relative;
    }
    .content-area.loading { display: flex; align-items: center; justify-content: center; color: #aaa; }

    .markdown-body { max-width: 800px; margin: 0 auto; line-height: 1.7; }
    .markdown-body h1 { font-size: 1.6rem; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid #e94560; }
    .markdown-body h2 { font-size: 1.2rem; margin: 24px 0 8px; color: #1a1a2e; }
    .markdown-body h3 { font-size: 1rem; margin: 16px 0 6px; color: #444; }
    .markdown-body p { margin-bottom: 12px; }
    .markdown-body ul, .markdown-body ol { margin: 8px 0 12px 20px; }
    .markdown-body li { margin-bottom: 4px; }
    .markdown-body a { color: #e94560; text-decoration: none; }
    .markdown-body a:hover { text-decoration: underline; }
    .markdown-body table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 0.85rem; }
    .markdown-body th { background: #1a1a2e; color: #fff; padding: 8px 12px; text-align: left; }
    .markdown-body td { padding: 8px 12px; border-bottom: 1px solid #eee; }
    .markdown-body tr:hover td { background: #f9f9f9; }
    .markdown-body code { background: #f4f4f4; padding: 2px 6px; border-radius: 3px; font-size: 0.85em; }
    .markdown-body pre { background: #1a1a2e; color: #e0e0e0; padding: 16px; border-radius: 6px; overflow-x: auto; margin: 12px 0; }
    .markdown-body pre code { background: none; padding: 0; color: inherit; }
    .markdown-body blockquote { border-left: 4px solid #e94560; padding-left: 16px; color: #666; margin: 12px 0; }
    .markdown-body input[type="checkbox"] { margin-right: 6px; }

    .placeholder { text-align: center; color: #aaa; margin-top: 80px; }
    .placeholder p { font-size: 1rem; margin-top: 8px; }

    /* スクロールトップボタン */
    .scroll-top {
      position: fixed; bottom: 24px; right: 24px;
      width: 44px; height: 44px; border-radius: 50%;
      background: #e94560; color: #fff; border: none;
      font-size: 1.2rem; cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      display: none; align-items: center; justify-content: center;
      transition: opacity 0.2s;
      z-index: 100;
    }
    .scroll-top.visible { display: flex; }
    .scroll-top:hover { background: #c73652; }

    /* スマホ対応 */
    @media (max-width: 768px) {
      .layout { display: block; height: auto; min-height: calc(100vh - 96px); }

      .file-list {
        width: 100%; min-width: unset; border-right: none;
        border-bottom: 1px solid #e0e0e0;
        max-height: calc(100vh - 96px); overflow-y: auto;
      }
      .file-list.hidden { display: none; }

      .content-area {
        width: 100%; padding: 16px;
        min-height: calc(100vh - 96px);
        display: none;
      }
      .content-area.visible { display: block; }

      .back-btn {
        display: flex; align-items: center; gap: 6px;
        margin-bottom: 16px; padding: 8px 12px;
        background: #f0f4ff; border: none; border-radius: 6px;
        color: #1a1a2e; font-size: 0.9rem; cursor: pointer;
        font-weight: 600;
      }
      .tab-btn { padding: 12px 16px; font-size: 0.85rem; }
      .scroll-top { bottom: 16px; right: 16px; width: 40px; height: 40px; font-size: 1rem; }
    }

    /* PC: content-area は常に表示 */
    @media (min-width: 769px) {
      .content-area { display: block !important; }
      .back-btn { display: none !important; }
    }
  </style>
</head>
<body>

<header>
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#e94560" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
  <h1>Life Ideas</h1>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('daily', this)">Daily</button>
  <button class="tab-btn" onclick="switchTab('weekly', this)">Weekly</button>
  <button class="tab-btn" onclick="switchTab('urls', this)">URLs</button>
</div>

<div class="layout">
  <div class="file-list" id="file-list">
    <div class="file-item empty">読み込み中...</div>
  </div>
  <div class="content-area" id="content-area">
    <div class="placeholder">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ddd" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <p>ファイルを選択してください</p>
    </div>
  </div>
</div>

<button class="scroll-top" id="scroll-top" onclick="scrollToTop()" title="上に戻る">↑</button>

<script>
  const REPO = 'godjob/life-ideas';
  const BRANCH = 'main';
  let currentTab = 'daily';
  const isMobile = () => window.innerWidth <= 768;

  // marked: 外部リンクを新タブで開く
  const renderer = new marked.Renderer();
  renderer.link = (href, title, text) => {
    const isExternal = href && (href.startsWith('http://') || href.startsWith('https://'));
    const titleAttr = title ? ` title="${title}"` : '';
    const target = isExternal ? ' target="_blank" rel="noopener noreferrer"' : '';
    return `<a href="${href}"${titleAttr}${target}>${text}</a>`;
  };
  marked.use({ renderer });

  async function listFiles(dir) {
    const url = `https://api.github.com/repos/${REPO}/contents/ideas/${dir}?ref=${BRANCH}`;
    const res = await fetch(url);
    if (!res.ok) return [];
    const data = await res.json();
    return data.filter(f => f.name.endsWith('.md') && f.name !== '.gitkeep');
  }

  async function fetchContent(path) {
    const url = `https://raw.githubusercontent.com/${REPO}/${BRANCH}/${path}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`${res.status} ${res.statusText}: ${path}`);
    return await res.text();
  }

  function formatLabel(dir, name) {
    const base = name.replace('.md', '');
    if (dir === 'daily') {
      // "2026-03-08" → "'26/03-08"
      const parts = base.split('-');
      return `'${parts[0].slice(2)}/${parts[1]}-${parts[2]}`;
    }
    return base;
  }

  async function switchTab(dir, btn) {
    currentTab = dir;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');

    const listEl = document.getElementById('file-list');
    const contentEl = document.getElementById('content-area');

    listEl.innerHTML = '<div class="file-item empty">読み込み中...</div>';
    contentEl.innerHTML = '<div class="placeholder"><p>ファイルを選択してください</p></div>';

    // モバイル: ファイルリストを表示、コンテンツを非表示
    if (isMobile()) {
      listEl.classList.remove('hidden');
      contentEl.classList.remove('visible');
    }

    // URLs タブは index.md を直接表示
    if (dir === 'urls') {
      listEl.innerHTML = '<div class="file-item active">URLリスト</div>';
      openFile('ideas/urls/index.md', listEl.firstChild);
      return;
    }

    const files = await listFiles(dir);

    if (files.length === 0) {
      listEl.innerHTML = '<div class="file-item empty">ファイルなし</div>';
      return;
    }

    listEl.innerHTML = '';
    files.sort((a, b) => b.name.localeCompare(a.name));

    files.forEach(file => {
      const item = document.createElement('div');
      item.className = 'file-item';
      item.textContent = formatLabel(dir, file.name);
      item.title = file.name.replace('.md', '');
      item.onclick = () => openFile(file.path, item);
      listEl.appendChild(item);
    });

    // PCは最新ファイルを自動で開く、モバイルはリスト表示のまま
    if (!isMobile()) {
      listEl.firstChild.click();
    }
  }

  async function openFile(path, itemEl) {
    const listEl = document.getElementById('file-list');
    const contentEl = document.getElementById('content-area');

    document.querySelectorAll('.file-item').forEach(i => i.classList.remove('active'));
    itemEl.classList.add('active');

    // モバイル: コンテンツを表示、ファイルリストを非表示
    if (isMobile()) {
      listEl.classList.add('hidden');
      contentEl.classList.add('visible');
    }

    contentEl.innerHTML = '<div class="loading">読み込み中...</div>';
    contentEl.classList.add('loading');

    let text;
    try {
      text = await fetchContent(path);
    } catch (e) {
      contentEl.classList.remove('loading');
      contentEl.innerHTML = `<div class="placeholder"><p style="color:#e94560;">読み込みエラー<br><small>${e.message}</small></p></div>`;
      return;
    }
    contentEl.classList.remove('loading');

    // 戻るボタン（モバイルのみ表示）
    const backBtn = `<button class="back-btn" onclick="showFileList()">← 一覧に戻る</button>`;
    contentEl.innerHTML = backBtn + `<div class="markdown-body">${marked.parse(text)}</div>`;

    // チェックボックスを本物のチェックボックスに変換
    contentEl.querySelectorAll('li').forEach(li => {
      if (li.textContent.startsWith('[ ]')) {
        li.innerHTML = '<input type="checkbox" disabled> ' + li.innerHTML.replace('[ ]', '').trim();
      } else if (li.textContent.startsWith('[x]') || li.textContent.startsWith('[X]')) {
        li.innerHTML = '<input type="checkbox" checked disabled> ' + li.innerHTML.replace(/\[[xX]\]/, '').trim();
      }
    });

    contentEl.scrollTop = 0;
  }

  function showFileList() {
    const listEl = document.getElementById('file-list');
    const contentEl = document.getElementById('content-area');
    listEl.classList.remove('hidden');
    contentEl.classList.remove('visible');
  }

  // スクロールトップボタン
  const contentEl = document.getElementById('content-area');
  contentEl.addEventListener('scroll', () => {
    const btn = document.getElementById('scroll-top');
    if (contentEl.scrollTop > 300) {
      btn.classList.add('visible');
    } else {
      btn.classList.remove('visible');
    }
  });
  // モバイルはwindowスクロール
  window.addEventListener('scroll', () => {
    const btn = document.getElementById('scroll-top');
    if (window.scrollY > 300) {
      btn.classList.add('visible');
    } else {
      btn.classList.remove('visible');
    }
  });

  function scrollToTop() {
    if (isMobile()) {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } else {
      document.getElementById('content-area').scrollTo({ top: 0, behavior: 'smooth' });
    }
  }

  // 初期表示
  switchTab('daily', document.querySelector('.tab-btn'));
</script>

</body>
</html>
